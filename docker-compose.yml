services:
  ordersmicroserviceapi:
    image: ordersmicroserviceapi
    build:
      context: .
      dockerfile: OrdersMicroserviceAPI/Dockerfile
    environment:
     - ASPNETCORE_ENVIRONMENT=Development
     - MONGO_HOST=mongodb-container
     - MONGO_PORT=27017
     - MONGODB_DATABASE=OrdersDatabase
     - UsersMicroserviceDomain=users-microservice
     - UsersMicroservicePort=8080
     - ProductsMicroserviceDomain=products-microservice
     - ProductsMicroservicePort=8080
    ports:
     - "7000:8080"
    networks:
     - orders-mongodb-network
     - ecommerce-network
    depends_on:
     - mongodb-container

  mongodb-container:
   image: mongo:latest
   ports:
    - "27017:27017"
   volumes:
    - ./containers-init/Mongo_DB_Script:/docker-entrypoint-initdb.d
   networks:
    - orders-mongodb-network

  products-microservice:
   image: products-microservice:latest
   environment:
    - ASPNETCORE_HTTP_PORTS=8080
    - ASPNETCORE_ENVIRONMENT=Development
    - MYSQL_HOST=mysql-container
    - MYSQL_DATABASE=ecommerceproductsdatabase
    - MYSQL_PORT=3306
    - MYSQL_PASSWORD=admin
   ports:
    - "6000:8080"
   networks:
    - products-mysql-network
    - ecommerce-network
   depends_on:
    - mysql-container
  
  mysql-container:
   image: mysql:8.4.8
   environment:
    - MYSQL_ROOT_PASSWORD=admin
   ports:
    - "3307:3306"
   volumes:
    - ./containers-init/MySQL_DB_Script:/docker-entrypoint-initdb.d
   networks:
    - products-mysql-network

  users-microservice:
   image: users-microservice:latest
   environment:
    - ASPNETCORE_HTTP_PORTS=8080
    - ASPNETCORE_ENVIRONMENT=Development
    - POSTGRES_HOST=postgres-container
    - POSTGRES_PORT=5432
    - POSTGRES_DATABASE=eCommerceUsers
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=admin
   ports:
    - "5000:8080"
   networks:
    - ecommerce-network
    - users-postgres-network
   depends_on:
    - postgres-container

  postgres-container:
   image: postgres:16
   environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=admin
    - POSTGRES_DB=eCommerceUsers
   ports:
    - "5433:5432"
   volumes:
    - ./containers-init/Postgres_DB_Script:/docker-entrypoint-initdb.d
   networks:
    - users-postgres-network
  
networks:
 orders-mongodb-network:
  driver: bridge
 products-mysql-network:
  driver: bridge
 users-postgres-network:
  driver: bridge
 ecommerce-network:
  driver: bridge